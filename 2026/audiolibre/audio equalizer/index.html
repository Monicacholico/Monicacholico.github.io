<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css" integrity="sha384-AYmEC3Yw5cVb3ZcuHtOA93w35dYTsvhLPVnYs9eStHfGJvOvKxVfELGroGkvsg+p" crossorigin="anonymous"/>
    <link rel="stylesheet" href="styles.css">
    <script src="scripts.js" defer></script>
    <title>Music Player</title>
</head>
<body>
    <header>
        <h2>Music Player</h2>
    </header>
    <section class="section">
        <div class="music-container" data-playlist="audiolibre">
            <div class="music-info">
                <h4 class="title">Medea — fragmento</h4>
                <div class="progress-container">
                    <div class="progress"></div>
                </div>
            </div>
            <audio class="audio" src="https://www.feel-like-dancing.com/tiendadeballet/wp-content/uploads/2026/06/Voice-AI-lector-fragmento.mp3"></audio>
            <div class="img-container">
                <img class="cover" src="./assets/images/desert.png" alt="">
            </div>
            <div class="navigation">
                <button class="prev action-btn">
                    <i class="fas fa-backward"></i>
                </button>
                <button class="play action-btn-big">
                    <i class="fas fa-play"></i>
                </button>
                <button class="next action-btn">
                    <i class="fas fa-forward"></i>
                </button>
            </div>
        </div>
        <div class="music-container">
            <div class="music-info">
                <h4 class="title">Sunshine</h4>
                <div class="progress-container">
                    <div class="progress"></div>
                </div>
            </div>
            <audio class="audio" src="https://www.feel-like-dancing.com/tiendadeballet/wp-content/uploads/2026/06/audiolibre-fragmento.mp3"></audio>
            <div class="img-container">
                <img class="cover" src="./assets/images/sunshine.png" alt="">
            </div>
            <div class="navigation">
                <button class="prev action-btn">
                    <i class="fas fa-backward"></i>
                </button>
                <button class="play action-btn-big">
                    <i class="fas fa-play"></i>
                </button>
                <button class="next action-btn">
                    <i class="fas fa-forward"></i>
                </button>
            </div>
        </div>
    </section>
</body>
</html>
