<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lesiones en el ballet — Feel Like Dancing (interactive)</title>
        <link rel="stylesheet" href="style.css" />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    </head>
    <body>
        <div class="ad" data-index="0" data-variant="mobile">
            <a class="logo" href="https://www.feel-like-dancing.com/" target="_blank" rel="noopener noreferrer">
                <span class="logo-text">Feel Like Dancing</span>
            </a>
            <nav class="navigation" aria-label="Navegación entre lesiones">
                <button type="button" class="arrow arrow-left" aria-label="Anterior"></button>
                <button type="button" class="arrow arrow-right" aria-label="Siguiente"></button>
            </nav>
            <div class="frontImage" role="img" aria-hidden="true"></div>
            <div class="overlay-container"></div>
            <div class="image-container" role="img" aria-label="Diagrama de pierna (placeholder)"></div>
        </div>
        <script src="app.js"></script>
    </body>
</html>
