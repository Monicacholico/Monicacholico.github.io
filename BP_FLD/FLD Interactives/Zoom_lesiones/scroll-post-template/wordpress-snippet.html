<!--
  FEEL LIKE DANCING — embed del “scroll-post-template” en WordPress (IFRAME)

  Referencia (inline completo, no recomendado en WP): wordpress-snippet-inline-archive.html

  Por qué iframe: el sticky + scroll suele romperse dentro de los muchos contenedores del tema;
  en un documento propio (esta carpeta servida por HTTPS) el layout es estable.

  Pasos:
  1) Sube por FTP o empaqueta en Medios + enlaces la carpeta scroll-post-template (al menos:
     index.html, styles.css, script.js, zoom-config.json, assets/…)
     y anota la URL pública de index.html.

  2) Sustituye REPLACE_IFRAME_SRC abajo por esa URL absoluta, por ejemplo:
     https://www.feel-like-dancing.com/ruta/a/scroll-post-template/index.html

  3) Ajusta la altura del iframe en .fld-wp-embed iframe (height / max-height).
     Los iframes no crecen solos con el contenido interno sin un script postMessage (no incluido).

  4) SEO: en el post deja título, meta, extracto y párrafos en bloques normales; el iframe es la pieza interactiva.

  5) Bloque “HTML personalizado”: pega desde <style> hasta el cierre del </div> (puedes quitar este comentario HTML si molesta).
-->

<style>
    .fld-wp-embed {
        max-width: 1100px;
        margin: 1.5rem auto;
        width: 100%;
        box-sizing: border-box;
    }
    .fld-wp-embed iframe {
        width: 100%;
        height: min(92vh, 960px);
        min-height: 640px;
        max-height: 1000px;
        border: 0;
        display: block;
        border-radius: 12px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
    }
    @media (max-width: 600px) {
        .fld-wp-embed iframe {
            height: min(90vh, 900px);
            min-height: 560px;
        }
    }
</style>
<div class="fld-wp-embed">
    <iframe
        title="Lesiones en el ballet — interactivo (scroll)"
        src="REPLACE_IFRAME_SRC"
        loading="lazy"
        referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
</div>
